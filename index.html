<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Kelas - Tema Orange</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <a href="#">
                    <img src="https://image2url.com/r2/default/images/1772205049976-6d43059f-da8b-4148-a3d4-6119602c2b63.jpg" alt="Logo" class="logo-img">
                    KALDERA
                </a>
            </div>

            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#event">Event</a></li>
                <li><a href="#struktur">Struktur</a></li>
                <li><a href="#member">Member</a></li>
            </ul>
        </div>
    </nav>

    <section class="home" id="home">
        <div class="hero-content">
            <img src="https://image2url.com/r2/default/images/1772205049976-6d43059f-da8b-4148-a3d4-6119602c2b63.jpg"
                alt="Logo" class="hero-logo">
            <h1>KALDERA</h1>
            <p>Selamat Datang di Website Resmi Kelas Kami!</p>
            <p>CIHUYYYY</p>
        </div>
    </section>

    <section class="event" id="event">
        <h2 class="event-section-title">Event Kelas</h2>
    
        <div class="event-container">
    
            <div class="event-visual-area">
                <div class="bg-scroll-layer" id="bgScroll">
                    <div class="scroll-content" id="bgSlider"></div>
                </div>
    
                <div class="main-frame">
                    <div class="frame-slider" id="frameSlider"></div>
                </div>
            </div>
    
            <div class="event-info-panel">
                <div class="info-content">
                    <h3 id="eventTitle"></h3>
                    <p id="eventDesc"></p>
                    <a href="#" class="btn-event" id="eventBtn">Selengkapnya</a>
                </div>
            </div>
        </div>
    </section>

    
    <script src="script.js"></script>

</html>
